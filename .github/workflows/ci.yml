name: CI

on:
  push:
    tags-ignore: ['v*']
  pull_request:
    branches: [main]
  workflow_call:

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '18'

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Build frontend (required for go:embed)
        working-directory: frontend
        run: npm install && npm run build
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '25.1'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install protoc Go plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
      - name: Generate protobuf stubs
        run: protoc --go_out=. --go-grpc_out=. --go_opt=paths=source_relative --go-grpc_opt=paths=source_relative plugins/proto/storage.proto
      - run: go vet ./...
      - run: go build ./...
      # CGO_ENABLED=0 ensures the mock plugin compiled by loader's TestMain
      # (plugins/testdata/mock-plugin) is a static binary that runs on the CI
      # Linux runner without libc dependency issues.
      - run: CGO_ENABLED=0 go test ./... -coverprofile=coverage.out -covermode=atomic -coverpkg=./internal/backends/...,./internal/config/...,./internal/sync/...,./plugins/grpc/...,./plugins/loader/...
      - name: Enforce 70% coverage (business packages only)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          awk "BEGIN {exit !($COVERAGE < 70)}" && echo "❌ Below 70%" && exit 1 || echo "✅ OK"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: npm run test
        working-directory: frontend
