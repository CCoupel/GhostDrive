name: Release

on:
  workflow_run:
    workflows: [Build]
    types: [completed]

permissions:
  contents: write

jobs:
  # ============================================
  # Publish GitHub Release after successful Build
  # ============================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-tags: true

      - name: Get version from tag
        id: version
        run: |
          TAG=$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" | grep '^v' | head -1)
          if [ -z "$TAG" ]; then
            echo "❌ No version tag found for commit ${{ github.event.workflow_run.head_sha }}"
            exit 1
          fi
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT
          echo "Found tag: $TAG"

      - name: Download artifacts from Build workflow
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          merge-multiple: true

      - name: List artifacts
        run: |
          echo "Release artifacts:"
          ls -lh artifacts/

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          NOTES=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "⚠️  No release notes found in CHANGELOG.md for v$VERSION — using default"
            NOTES="Release v$VERSION"
          else
            echo "✅ Release notes extracted for v$VERSION"
          fi
          echo "$NOTES" > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: GhostDrive v${{ steps.version.outputs.VERSION }}
          body_path: release_notes.md
          files: artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: |
          echo "=========================================="
          echo "🚀 GhostDrive ${{ steps.version.outputs.TAG }} published"
          echo ""
          echo "Assets:"
          ls -1 artifacts/
          echo ""
          echo "https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.TAG }}"
          echo "=========================================="
