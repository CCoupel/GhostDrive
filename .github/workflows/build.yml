name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  GO_VERSION: '1.21'
  NODE_VERSION: '18'

jobs:
  # ============================================
  # 1. CI complète (réutilise ci.yml)
  # ============================================
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  # ============================================
  # 2. Inject version from tag (source of truth)
  # ============================================
  version:
    name: Set Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: v
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Patch config.json
        run: |
          jq --arg v "${{ steps.v.outputs.VERSION }}" '.version = $v' config.json > tmp && mv tmp config.json
          echo "✅ config.json → $(jq -r '.version' config.json)"

      - name: Patch frontend/package.json
        run: |
          jq --arg v "${{ steps.v.outputs.VERSION }}" '.version = $v' frontend/package.json > tmp && mv tmp frontend/package.json
          echo "✅ package.json → $(jq -r '.version' frontend/package.json)"

      - uses: actions/upload-artifact@v7
        with:
          name: versioned-configs
          path: |
            config.json
            frontend/package.json
          retention-days: 1

  # ============================================
  # 3. Cross-compile (parallel, bloqué par CI + version)
  # ============================================
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: [ci, version]
    strategy:
      matrix:
        include:
          - target: windows-amd64
            goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
          - target: linux-arm64
            goos: linux
            goarch: arm64
            suffix: linux-arm64
    steps:
      - uses: actions/checkout@v6

      - name: Download versioned configs
        uses: actions/download-artifact@v8
        with:
          name: versioned-configs

      - name: Restore patched frontend/package.json
        run: mv package.json frontend/package.json 2>/dev/null || true

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build frontend
        working-directory: frontend
        run: npm install && npm run build

      # TODO(#33,#34): remplacer par `wails build -platform ${{ matrix.goos }}/${{ matrix.goarch }}`
      # une fois cmd/ghostdrive/main.go implémenté.
      # Linux CI requiert : libgtk-3-dev, libwebkit2gtk-4.0-dev
      - name: Cross-compile Go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build ./internal/... ./plugins/...
          echo "✅ ${{ matrix.goos }}/${{ matrix.goarch }} OK"

      - name: Create artifact
        run: |
          FILE="ghostdrive-v${{ needs.version.outputs.version }}-${{ matrix.suffix }}"
          printf "GhostDrive v%s — %s/%s\nTODO: Wails binary (cmd/ghostdrive/main.go pending)\n" \
            "${{ needs.version.outputs.version }}" "${{ matrix.goos }}" "${{ matrix.goarch }}" > "$FILE"

      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.target }}
          path: ghostdrive-v${{ needs.version.outputs.version }}-${{ matrix.suffix }}
          retention-days: 1

  # ============================================
  # 4. GitHub Release
  # ============================================
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [version, build]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          NOTES=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          [ -z "$NOTES" ] && NOTES="Release v$VERSION"
          echo "$NOTES" > release_notes.md
          echo "✅ Release notes for v$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: GhostDrive v${{ needs.version.outputs.version }}
          body_path: release_notes.md
          files: artifacts/binary-*/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
