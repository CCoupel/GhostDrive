name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '18'
  WAILS_VERSION: 'v2.12.0'

jobs:
  # ============================================
  # 1. CI complète (réutilise ci.yml)
  # ============================================
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  # ============================================
  # 2. Inject version from tag (source of truth)
  # ============================================
  version:
    name: Set Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: v
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Patch config.json
        run: |
          jq --arg v "${{ steps.v.outputs.VERSION }}" '.version = $v' config.json > tmp && mv tmp config.json
          echo "✅ config.json → $(jq -r '.version' config.json)"

      - name: Patch frontend/package.json
        run: |
          jq --arg v "${{ steps.v.outputs.VERSION }}" '.version = $v' frontend/package.json > tmp && mv tmp frontend/package.json
          echo "✅ package.json → $(jq -r '.version' frontend/package.json)"

      - uses: actions/upload-artifact@v7
        with:
          name: versioned-configs
          path: |
            config.json
            frontend/package.json
          retention-days: 1

  # ============================================
  # 3. Cross-compile (parallel, bloqué par CI + version)
  # ============================================
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: [ci, version]
    strategy:
      matrix:
        include:
          - target: windows-amd64
            goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
            cc: x86_64-w64-mingw32-gcc
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download versioned configs
        uses: actions/download-artifact@v8
        with:
          name: versioned-configs

      - name: Restore patched frontend/package.json
        run: mv package.json frontend/package.json 2>/dev/null || true

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install MinGW toolchain (Windows AMD64)
        if: matrix.target == 'windows-amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Install WinFsp FUSE headers for cgofuse cross-compilation
        if: matrix.target == 'windows-amd64'
        run: |
          # cgofuse host_cgo.go requires WinFsp FUSE headers at /usr/local/include/winfsp/
          # when cross-compiling for Windows with CGO_ENABLED=1 (mingw32).
          sudo mkdir -p /usr/local/include/winfsp
          BASE="https://raw.githubusercontent.com/winfsp/winfsp/v2.0/inc/fuse"
          for h in fuse.h fuse_common.h fuse_opt.h winfsp_fuse.h; do
            sudo wget -q "${BASE}/${h}" -O "/usr/local/include/winfsp/${h}"
          done

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '25.1'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install protoc Go plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate protobuf stubs
        run: protoc --go_out=. --go-grpc_out=. --go_opt=paths=source_relative --go-grpc_opt=paths=source_relative plugins/proto/storage.proto

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Build frontend
        working-directory: frontend
        run: npm install && npm run build

      - name: Wails cross-compile
        env:
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          FILE="ghostdrive-v${{ needs.version.outputs.version }}-${{ matrix.suffix }}"
          wails build -platform ${{ matrix.goos }}/${{ matrix.goarch }} -o "$FILE" -skipbindings
          echo "✅ ${{ matrix.goos }}/${{ matrix.goarch }} → $FILE"

      - name: Build plugins (auto-discovery — pure Go, CGO_ENABLED=0)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          SUFFIX="${{ matrix.suffix }}"
          mkdir -p build/plugins
          built=0
          # Discover plugins: any plugins/*/cmd/ directory with buildable Go files.
          # go list returns nothing for //go:build ignore or empty packages → safely skipped.
          for cmd_dir in plugins/*/cmd; do
            [ -d "$cmd_dir" ] || continue
            plugin_name=$(basename "$(dirname "$cmd_dir")")
            pkg=$(go list "./$cmd_dir/" 2>/dev/null) || continue
            [ -z "$pkg" ] && continue
            out="build/plugins/ghostdrive-${plugin_name}-v${VERSION}-${SUFFIX}"
            go build -ldflags="-s -w" -o "$out" "./$cmd_dir/"
            echo "✅ ${plugin_name} → $out (place in plugins/ subfolder)"
            built=$((built + 1))
          done
          echo "Total plugins built: $built"

      - name: Locate binary
        id: bin
        run: |
          FILE="ghostdrive-v${{ needs.version.outputs.version }}-${{ matrix.suffix }}"
          # wails build outputs to build/bin/ by default when -o has no path separator
          if [ -f "build/bin/$FILE" ]; then
            echo "path=build/bin/$FILE" >> $GITHUB_OUTPUT
          else
            echo "path=$FILE" >> $GITHUB_OUTPUT
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.target }}
          path: ${{ steps.bin.outputs.path }}
          retention-days: 1

      - uses: actions/upload-artifact@v7
        with:
          name: plugins-${{ matrix.target }}
          path: build/plugins/
          retention-days: 1

  # ============================================
  # 4. GitHub Release
  # ============================================
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [version, build]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          NOTES=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          [ -z "$NOTES" ] && NOTES="Release v$VERSION"
          echo "$NOTES" > release_notes.md
          echo "✅ Release notes for v$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: GhostDrive v${{ needs.version.outputs.version }}
          body_path: release_notes.md
          files: |
            artifacts/binary-*/*
            artifacts/plugins-*/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
