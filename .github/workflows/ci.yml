name: CI

on:
  push:
    tags-ignore: ['v*']
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      prod_mode:
        type: boolean
        default: false
        description: 'Utiliser les versions pinnées PROD (true) ou @latest canary QUALIF (false)'

# Nécessaire pour que le step "Sync PROD pins" puisse committer sur la branche QUALIF.
# En PROD (workflow_call), ce step est ignoré — la permission est sans effet.
permissions:
  contents: write

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '18'

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Build frontend (required for go:embed)
        working-directory: frontend
        run: npm install && npm run build
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '25.1'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # Charge les versions pinnées PROD depuis .ci-versions.env
      - name: Load CI pinned versions
        run: cat .ci-versions.env | grep -v '^#' | grep -v '^$' >> $GITHUB_ENV
      # PROD : appelé depuis build.yml avec prod_mode=true — versions pinnées
      # inputs.prod_mode est un passage explicite — pas d'ambiguïté de contexte.
      - name: Install protoc Go plugins (PROD — pinned)
        if: inputs.prod_mode == true
        run: |
          echo "Mode PROD — pins : protoc-gen-go=${PROTOC_GEN_GO_PIN}, protoc-gen-go-grpc=${PROTOC_GEN_GO_GRPC_PIN}"
          go install google.golang.org/protobuf/cmd/protoc-gen-go@${PROTOC_GEN_GO_PIN}
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@${PROTOC_GEN_GO_GRPC_PIN}
      # QUALIF : push/pull_request direct — canary @latest pour détecter les incompatibilités tôt
      - name: Install protoc Go plugins (QUALIF — @latest canary)
        if: inputs.prod_mode != true
        run: |
          echo "Mode QUALIF — canary @latest"
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
      # Après chaque QUALIF réussie (@latest), capture les versions résolues et
      # met à jour .ci-versions.env sur la branche courante. Le prochain tag PROD
      # utilisera ces pins sans intervention manuelle.
      # Exécuté uniquement sur push (pas pull_request, pas workflow_call/PROD).
      - name: Sync PROD pins from QUALIF resolved versions
        if: github.event_name == 'push'
        run: |
          # Capturer les versions résolues des binaires installés en @latest
          GRPC_VER=$(go version -m "$(which protoc-gen-go-grpc)" 2>/dev/null | awk '$1 == "mod" {print $3}')
          PB_VER=$(go version -m "$(which protoc-gen-go)" 2>/dev/null | awk '$1 == "mod" {print $3}')
          if [ -z "$GRPC_VER" ] || [ -z "$PB_VER" ]; then
            echo "⚠ Impossible de capturer les versions résolues — sync ignoré"
            exit 0
          fi
          echo "Versions @latest résolues : protoc-gen-go=${PB_VER}, protoc-gen-go-grpc=${GRPC_VER}"
          # Écrire .ci-versions.env (source de vérité PROD)
          {
            printf '# CI Pinned Versions — PROD (source de vérité)\n'
            printf '# Mis à jour automatiquement après chaque run QUALIF réussi (@latest).\n'
            printf '# Les jobs PROD (workflow_call depuis build.yml) lisent ces versions.\n'
            printf '#\n'
            printf 'PROTOC_GEN_GO_PIN=%s\n' "${PB_VER}"
            printf 'PROTOC_GEN_GO_GRPC_PIN=%s\n' "${GRPC_VER}"
          } > .ci-versions.env
          # Committer uniquement si le fichier a changé
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .ci-versions.env
          if git diff --cached --quiet; then
            echo "✅ Versions identiques — pas de commit"
          else
            git commit -m "chore(ci): sync PROD pins from QUALIF @latest [skip ci]"
            git push
            echo "✅ .ci-versions.env mis à jour et pushé"
          fi
      - name: Generate protobuf stubs
        run: protoc --go_out=. --go-grpc_out=. --go_opt=paths=source_relative --go-grpc_opt=paths=source_relative plugins/proto/storage.proto
      - run: go vet ./...
      - run: go build ./...
      # Pre-build the mock plugin as a static binary so that CGO_ENABLED=0
      # is scoped to this single build step and does NOT contaminate the race
      # detector used in the test step below.
      - name: Build mock plugin (static)
        run: CGO_ENABLED=0 go build -o /tmp/ghostdrive-mock-plugin ./plugins/testdata/mock-plugin/
      - name: Run tests with race detector
        env:
          # TestMain in plugins/loader reads this env var and skips the local
          # compile, using the pre-built static binary directly.
          GHOSTDRIVE_MOCK_PLUGIN: /tmp/ghostdrive-mock-plugin
        run: go test -race ./... -coverprofile=coverage.out -covermode=atomic -coverpkg=./internal/backends/...,./internal/config/...,./internal/sync/...,./plugins/grpc/...,./plugins/loader/...
      - name: Enforce 70% coverage (business packages only)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          awk "BEGIN {exit !($COVERAGE < 70)}" && echo "❌ Below 70%" && exit 1 || echo "✅ OK"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: npm run test
        working-directory: frontend
