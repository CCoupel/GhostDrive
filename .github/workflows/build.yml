name: Build

on:
  push:
    tags: ['v*']

env:
  GO_VERSION: '1.21'
  NODE_VERSION: '18'

jobs:
  # ============================================
  # STAGE 1 : Inject version from tag (tag = source of truth)
  # ============================================
  version-check:
    name: Set Version from Tag
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Patch config.json
        run: |
          jq --arg v "${{ steps.version.outputs.VERSION }}" '.version = $v' config.json > config.json.tmp
          mv config.json.tmp config.json
          echo "✅ config.json → $(jq -r '.version' config.json)"

      - name: Patch frontend/package.json
        run: |
          jq --arg v "${{ steps.version.outputs.VERSION }}" '.version = $v' frontend/package.json > package.json.tmp
          mv package.json.tmp frontend/package.json
          echo "✅ package.json → $(jq -r '.version' frontend/package.json)"

      - name: Upload patched config files
        uses: actions/upload-artifact@v4
        with:
          name: versioned-configs
          path: |
            config.json
            frontend/package.json
          retention-days: 1

  # ============================================
  # STAGE 2 : Cross-compile (parallel)
  # ============================================
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: version-check

    strategy:
      matrix:
        include:
          - target: Windows AMD64
            goos: windows
            goarch: amd64
            artifact_suffix: windows-amd64.exe
          - target: Linux ARM64
            goos: linux
            goarch: arm64
            artifact_suffix: linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download versioned configs
        uses: actions/download-artifact@v4
        with:
          name: versioned-configs

      - name: Restore patched frontend/package.json
        run: mv package.json frontend/package.json 2>/dev/null || true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      # TODO(#33, #34): Replace with `wails build -platform ${{ matrix.goos }}/${{ matrix.goarch }}`
      # once cmd/ghostdrive/main.go is implemented.
      # Wails on Linux CI requires: libgtk-3-dev, libwebkit2gtk-4.0-dev (apt-get install)
      # Wails on Windows CI requires: MSVC + WebView2 SDK
      - name: Cross-compile Go packages
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          echo "Building internal packages for ${{ matrix.target }}..."
          go build ./internal/... ./plugins/...
          echo "✅ Compilation OK — ${{ matrix.goos }}/${{ matrix.goarch }}"

      - name: Create release artifact
        run: |
          FILENAME="ghostdrive-v${{ needs.version-check.outputs.version }}-${{ matrix.artifact_suffix }}"
          # Placeholder until Wails binary build is wired up (see TODO above)
          printf "GhostDrive v%s\nTarget: %s/%s\nStatus: BUILD PLACEHOLDER — Wails binary pending cmd/ghostdrive/main.go\n" \
            "${{ needs.version-check.outputs.version }}" \
            "${{ matrix.goos }}" \
            "${{ matrix.goarch }}" > "$FILENAME"
          echo "artifact_name=$FILENAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ghostdrive-v${{ needs.version-check.outputs.version }}-${{ matrix.artifact_suffix }}
          retention-days: 1
